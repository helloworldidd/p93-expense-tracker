<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Pro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container py-5">

        <h1 class="text-center mb-5">
            Expense Tracker Pro
        </h1>

        <!-- Dashboard -->

        <div class="row g-3 mb-4">

            <div class="col-md-4">
                <div class="card dashboard-card">
                    <div class="card-body text-center">
                        <h5>Balance</h5>
                        <h2 id="balance">$0</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card dashboard-card income">
                    <div class="card-body text-center">
                        <h5>Ingresos</h5>
                        <h2 id="income">$0</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card dashboard-card expense">
                    <div class="card-body text-center">
                        <h5>Gastos</h5>
                        <h2 id="expense">$0</h2>
                    </div>
                </div>
            </div>

        </div>

        <!-- Formulario -->

        <div class="card mb-4">

            <div class="card-body">

                <h3>Nuevo Movimiento</h3>

                <form id="transaction-form">

                    <div class="mb-3">
                        <input
                            type="text"
                            id="description"
                            class="form-control"
                            placeholder="Descripción"
                            required>
                    </div>

                    <div class="mb-3">
                        <input
                            type="number"
                            id="amount"
                            class="form-control"
                            placeholder="Monto"
                            required>
                    </div>

                    <div class="mb-3">

                        <select
                            id="type"
                            class="form-select">

                            <option value="income">
                                Ingreso
                            </option>

                            <option value="expense">
                                Gasto
                            </option>

                        </select>

                    </div>

                    <button
                        class="btn btn-primary w-100">
                        Agregar Movimiento
                    </button>

                </form>

            </div>

        </div>

        <!-- Historial -->

        <div class="card">

            <div class="card-body">

                <h3>Historial</h3>

                <ul
                    id="transaction-list"
                    class="list-group">
                </ul>

            </div>

        </div>

    </div>

    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/chart.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
